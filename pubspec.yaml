name: campus_lost_found
description: University Lost & Found App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

  # Local (still used during transition)
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  google_fonts: ^6.1.0
  image_picker: ^1.1.2
  timeago: ^3.6.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4338CA"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
